<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#f4f6f8" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>병동 업무 리마인더</title>

<style>
  :root {
    /* 배경 색 (업무 성격) */
    --bg-regular: #eceef1;   /* 정규 · 회색 */
    --bg-deadline: #fcdce7;  /* 시간 제한 · 분홍 */
    --bg-before: #e0f0cd;    /* 퇴근 전 · 연두 */
    --bg-optional: #d4e9f7;  /* 선택 · 하늘 */
    /* 테두리 색 (담당/강조) */
    --bd-important: #ef6a6a; /* 중요 · 빨강 */
    --bd-mine: #5b90e6;      /* 내 업무 · 파랑 */
    --bd-other: #e6bb35;     /* 타 부서 확인 · 노랑 */
    --bd-otherdone: #a97ad0; /* 타 부서 시행 · 보라 */
    --bd-none: rgba(0,0,0,.14);

    --ink: #2c333b; --ink-soft: #5b6570;
    --page: #f4f6f8; --panel: #ffffff; --line: #e4e8ec; --accent: #6aa0d8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body { font-family: "Segoe UI","맑은 고딕","Malgun Gothic",system-ui,sans-serif; background: var(--page); color: var(--ink); font-size: 11px; padding-bottom: 40px; }

  /* 헤더 */
  header { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(244,246,248,.92); backdrop-filter: blur(6px); border-bottom: 1px solid var(--line); }
  header h1 { font-size: 15px; margin: 0; font-weight: 800; letter-spacing: -.3px; white-space: nowrap; }
  header .clock { font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 700; color: var(--ink-soft); }
  header .spacer { flex: 1; }
  .btn { font-family: inherit; font-size: 12px; font-weight: 700; border: 1px solid var(--line); background: var(--panel); color: var(--ink); padding: 7px 11px; border-radius: 9px; cursor: pointer; white-space: nowrap; transition: transform .06s; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(106,160,216,.35); }
  .btn.ghost { background: transparent; }
  .btn.warn { background: #fff6da; border-color: var(--bd-other); color: #8a6d00; }
  .btn.danger { background: #ffecec; border-color: var(--bd-important); color: #b12626; }
  #installBtn, #autoSortBtn, #clearBtn { display: none; }

  /* 입력 패널 */
  #panel { max-width: 560px; margin: 12px auto 0; padding: 0 14px; overflow: hidden; max-height: 0; transition: max-height .3s ease; }
  #panel.open { max-height: 720px; }
  .form { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px; display: grid; gap: 10px; box-shadow: 0 6px 20px rgba(40,55,75,.06); }
  .row { display: grid; gap: 8px; }
  .row.two { grid-template-columns: 1fr 1fr; }
  label { font-size: 10px; font-weight: 700; color: var(--ink-soft); display: block; margin-bottom: 4px; }
  input, textarea { width: 100%; font-family: inherit; font-size: 12px; color: var(--ink); border: 1px solid var(--line); border-radius: 9px; padding: 8px 9px; background: #fbfcfd; outline: none; }
  input:focus, textarea:focus { border-color: var(--accent); background: #fff; }
  textarea { resize: vertical; min-height: 46px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 11px; font-weight: 700; cursor: pointer; user-select: none; padding: 6px 10px; border-radius: 20px; border: 2px solid transparent; display: inline-flex; align-items: center; gap: 5px; background: #f1f4f7; color: var(--ink-soft); }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); }
  .chip[data-group="bg"].sel { color: var(--ink); box-shadow: 0 0 0 2px var(--accent) inset; }
  .chip[data-group="bd"].sel { color: var(--ink); box-shadow: 0 0 0 2px var(--ink) inset; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }

  /* 보드 · 환자별 줄 */
  #board { max-width: 1100px; margin: 0 auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .empty { color: var(--ink-soft); text-align: center; margin: 60px auto; font-size: 13px; }
  .empty .big { font-size: 34px; margin-bottom: 8px; }

  .prow { display: flex; align-items: stretch; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 6px rgba(40,55,75,.05); }
  .phead { width: 84px; flex-shrink: 0; background: #f1f4f7; border-right: 1px solid var(--line); padding: 8px; display: flex; flex-direction: column; justify-content: center; gap: 2px; }
  .phead .room { font-size: 14px; font-weight: 800; letter-spacing: -.3px; }
  .phead .name { font-size: 12px; font-weight: 700; color: var(--ink-soft); }
  .phead.common { background: #e9f1f7; }
  .phead.common .room { color: var(--accent); }

  .ptasks { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; align-content: center; align-items: center; min-height: 44px; }
  .task { font-size: 11px; font-weight: 700; padding: 6px 10px; border-radius: 9px; border: 2px solid var(--bd-none); cursor: grab; user-select: none; line-height: 1.2; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task.bg-regular  { background: var(--bg-regular); }
  .task.bg-deadline { background: var(--bg-deadline); }
  .task.bg-before   { background: var(--bg-before); }
  .task.bg-optional { background: var(--bg-optional); }
  .task.bd-important { border-color: var(--bd-important); }
  .task.bd-mine      { border-color: var(--bd-mine); }
  .task.bd-other     { border-color: var(--bd-other); }
  .task.bd-otherdone { border-color: var(--bd-otherdone); }
  .task.bd-important { font-size: 12.5px; color: #b83232; }
  .task.done { opacity: .45; text-decoration: line-through; }
  .task.dragging { opacity: .4; }
  .addchip { font-size: 14px; font-weight: 800; color: var(--ink-soft); background: transparent; border: 1.5px dashed var(--line); border-radius: 9px; padding: 4px 10px; cursor: pointer; line-height: 1.2; }
  .addchip:hover { border-color: var(--accent); color: var(--accent); }

  /* 팝오버 */
  #pop { position: fixed; z-index: 50; display: none; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 30px rgba(40,55,75,.22); padding: 10px; width: 220px; }
  #pop.open { display: block; }
  #pop .pop-content { font-size: 12px; color: var(--ink); line-height: 1.5; white-space: pre-wrap; margin-bottom: 9px; word-break: break-word; }
  #pop .pop-content i { color: var(--ink-soft); }
  #pop .pop-actions { display: flex; gap: 6px; }
  #pop .pop-actions button { flex: 1; font-family: inherit; font-size: 11px; font-weight: 700; border: 1px solid var(--line); background: #fbfcfd; border-radius: 8px; padding: 7px 4px; cursor: pointer; }
  #pop .pop-actions button[data-a="done"] { color: #2f8f4e; }
  #pop .pop-actions button[data-a="del"] { color: #b12626; }

  footer { text-align: center; color: var(--ink-soft); font-size: 10px; margin-top: 18px; opacity: .7; }
</style>

<header>
  <h1>병동 리마인더</h1>
  <span class="clock" id="clock">--:--</span>
  <span class="spacer"></span>
  <button class="btn warn" id="autoSortBtn">자동정렬</button>
  <button class="btn danger" id="clearBtn">전체 삭제</button>
  <button class="btn ghost" id="installBtn">설치</button>
  <button class="btn primary" id="addBtn">+ 업무</button>
</header>

<section id="panel">
  <form class="form" id="form" autocomplete="off">
    <div class="row"><div><label>할 일 (제목)</label><input id="f-title" required maxlength="40" /></div></div>
    <div class="row two">
      <div><label>병실 <span style="font-weight:400">· 비우면 병동 공통</span></label><input id="f-room" maxlength="20" /></div>
      <div><label>이름</label><input id="f-name" maxlength="20" /></div>
    </div>
    <div class="row"><div><label>내용 (선택)</label><textarea id="f-content" maxlength="200"></textarea></div></div>
    <div class="row">
      <label>배경 · 업무 성격</label>
      <div class="chips" id="bgChips">
        <span class="chip sel" data-group="bg" data-val="regular"><span class="dot" style="background:var(--bg-regular)"></span>정규</span>
        <span class="chip" data-group="bg" data-val="deadline"><span class="dot" style="background:var(--bg-deadline)"></span>시간 제한</span>
        <span class="chip" data-group="bg" data-val="before"><span class="dot" style="background:var(--bg-before)"></span>퇴근 전</span>
        <span class="chip" data-group="bg" data-val="optional"><span class="dot" style="background:var(--bg-optional)"></span>선택</span>
      </div>
    </div>
    <div class="row">
      <label>테두리 · 담당 / 강조</label>
      <div class="chips" id="bdChips">
        <span class="chip sel" data-group="bd" data-val="none"><span class="dot" style="background:var(--bd-none)"></span>없음</span>
        <span class="chip" data-group="bd" data-val="important"><span class="dot" style="background:var(--bd-important)"></span>중요</span>
        <span class="chip" data-group="bd" data-val="mine"><span class="dot" style="background:var(--bd-mine)"></span>내 업무</span>
        <span class="chip" data-group="bd" data-val="other"><span class="dot" style="background:var(--bd-other)"></span>타 부서 확인</span>
        <span class="chip" data-group="bd" data-val="otherdone"><span class="dot" style="background:var(--bd-otherdone)"></span>타 부서 시행</span>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn ghost" id="cancelBtn">취소</button>
      <button type="submit" class="btn primary" id="saveBtn">추가</button>
    </div>
  </form>
</section>

<main id="board"></main>
<div id="pop"></div>
<footer>환자별 to-do · 칸 클릭 = 내용/완료/수정 · 드래그로 순서·환자 이동</footer>

<script>
(() => {
  "use strict";
  const KEY = "ward-tasks-v1", SORTKEY = "ward-orders-v1", COMMON = "__COMMON__";
  const $ = (s, r=document) => r.querySelector(s);
  const board = $("#board"), form = $("#form"), panel = $("#panel"), pop = $("#pop");
  const autoSortBtn = $("#autoSortBtn"), clearBtn = $("#clearBtn");

  let tasks = load();
  let orders = loadOrders();          // { patientKey: [taskId,...] }
  let editingId = null;
  let sel = { bg: "regular", bd: "none" };
  let justDragged = false;
  let swReg = null;

  function load(){ try { return (JSON.parse(localStorage.getItem(KEY))||[]).map(migrate); } catch { return []; } }
  function migrate(t){ if (t.bd === "emphasis") t.bd = "important";
    return { id:t.id, createdAt:t.createdAt||Date.now(), done:!!t.done, title:t.title||"", room:t.room||"", name:t.name||"", content:t.content||"", bg:t.bg||"regular", bd:t.bd||"none" }; }
  function loadOrders(){ try { return JSON.parse(localStorage.getItem(SORTKEY)) || {}; } catch { return {}; } }
  function save(){ localStorage.setItem(KEY, JSON.stringify(tasks)); }
  function saveOrders(){ localStorage.setItem(SORTKEY, JSON.stringify(orders)); }
  function uid(){ return Date.now().toString(36) + Math.floor(Math.random()*1e4).toString(36); }
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  const pkey = t => (t.room || t.name) ? (t.room + "␟" + t.name) : COMMON;

  /* ── 줄(환자) 안 할 일 정렬: 중요 → 시간제한 → 입력순, 완료는 맨 뒤 ── */
  function autoTaskCmp(a, b){
    if (a.done !== b.done) return a.done ? 1 : -1;
    const iA = a.bd==="important", iB = b.bd==="important";
    if (iA !== iB) return iA ? -1 : 1;
    const dA = a.bg==="deadline", dB = b.bg==="deadline";
    if (dA !== dB) return dA ? -1 : 1;
    return a.createdAt - b.createdAt;
  }

  function buildGroups(){
    const map = new Map();
    for (const t of tasks){
      const k = pkey(t);
      if (!map.has(k)) map.set(k, { key:k, room:t.room||"", name:t.name||"", tasks:[] });
      map.get(k).tasks.push(t);
    }
    const arr = [...map.values()];
    arr.sort((a, b) => {
      const cA = a.key===COMMON, cB = b.key===COMMON;
      if (cA !== cB) return cA ? -1 : 1;                 // 공통 줄 맨 위
      if (a.room !== b.room) return a.room.localeCompare(b.room, "ko", { numeric:true });
      return a.name.localeCompare(b.name, "ko");
    });
    for (const g of arr){
      const ord = orders[g.key];
      if (ord && ord.length){
        const m = new Map(g.tasks.map(t => [t.id, t]));
        const inOrder = ord.map(id => m.get(id)).filter(Boolean);
        const rest = g.tasks.filter(t => !ord.includes(t.id)).sort(autoTaskCmp);
        g.tasks = [...inOrder, ...rest];
      } else g.tasks.sort(autoTaskCmp);
    }
    return arr;
  }

  /* ── 렌더 ── */
  function render(){
    board.innerHTML = "";
    if (!tasks.length){
      board.innerHTML = `<div class="empty"><div class="big">🩺</div>업무를 추가해 두세요.<br>환자별로 정리되어 표시됩니다.</div>`;
      updateAutoBtn(); return;
    }
    for (const g of buildGroups()) board.appendChild(rowEl(g));
    updateAutoBtn();
  }

  function rowEl(g){
    const row = document.createElement("div");
    row.className = "prow";
    const common = g.key === COMMON;
    const phead = document.createElement("div");
    phead.className = "phead" + (common ? " common" : "");
    phead.innerHTML = common
      ? `<div class="room">🏥 공통</div>`
      : `<div class="room">${g.room ? esc(g.room) : "&nbsp;"}</div>${g.name ? `<div class="name">${esc(g.name)}</div>` : ""}`;

    const wrap = document.createElement("div");
    wrap.className = "ptasks";
    wrap.dataset.key = g.key; wrap.dataset.room = g.room; wrap.dataset.name = g.name;

    for (const t of g.tasks) wrap.appendChild(taskEl(t));

    const add = document.createElement("button");
    add.className = "addchip"; add.textContent = "+"; add.title = "이 환자에 할 일 추가";
    add.addEventListener("click", () => openForm(null, { room:g.room, name:g.name }));
    wrap.appendChild(add);

    row.appendChild(phead); row.appendChild(wrap);
    return row;
  }

  function taskEl(t){
    const el = document.createElement("span");
    el.className = `task bg-${t.bg} bd-${t.bd}${t.done?" done":""}`;
    el.dataset.id = t.id;
    el.textContent = t.title;
    el.draggable = true;
    el.addEventListener("click", () => { if (justDragged) return; openPop(t, el); });
    el.addEventListener("dragstart", () => el.classList.add("dragging"));
    el.addEventListener("dragend", () => { el.classList.remove("dragging"); commitDrag(el); });
    return el;
  }

  function updateAutoBtn(){
    autoSortBtn.style.display = (Object.keys(orders).length && tasks.length) ? "inline-block" : "none";
    clearBtn.style.display = tasks.length ? "inline-block" : "none";
  }
  autoSortBtn.addEventListener("click", () => { orders = {}; saveOrders(); render(); });
  clearBtn.addEventListener("click", () => {
    if (confirm(`전체 업무 ${tasks.length}건을 모두 삭제할까요?\n되돌릴 수 없습니다.`)){
      tasks = []; orders = {}; save(); saveOrders(); closePop(); render();
    }
  });

  /* ── 드래그: 줄 안 순서 변경 + 다른 환자 줄로 이동 ── */
  board.addEventListener("dragover", e => {
    e.preventDefault();
    const dragging = board.querySelector(".task.dragging");
    if (!dragging) return;
    const wrap = e.target.closest(".ptasks");
    if (!wrap) return;
    const after = chipAfter(wrap, e.clientX, e.clientY);
    if (after) wrap.insertBefore(dragging, after);
    else wrap.insertBefore(dragging, wrap.querySelector(".addchip"));
  });
  board.addEventListener("drop", e => e.preventDefault());

  function chipAfter(wrap, x, y){
    const els = [...wrap.querySelectorAll(".task:not(.dragging)")];
    let best = null, bestD = Infinity, before = true;
    for (const el of els){
      const r = el.getBoundingClientRect();
      const cx = r.left+r.width/2, cy = r.top+r.height/2;
      const d = Math.hypot(x-cx, y-cy);
      if (d < bestD){ bestD = d; best = el; before = (y < r.top) ? true : (y > r.bottom) ? false : (x < cx); }
    }
    if (!best) return null;
    return before ? best : best.nextElementSibling && best.nextElementSibling.classList.contains("task") ? best.nextElementSibling : best.nextElementSibling;
  }

  function commitDrag(el){
    justDragged = true; setTimeout(() => justDragged = false, 60);
    const wrap = el.closest(".ptasks"); if (!wrap) return;
    const targetKey = wrap.dataset.key;
    const t = tasks.find(x => x.id === el.dataset.id); if (!t) return;
    const srcKey = pkey(t);
    if (targetKey !== srcKey){                       // 다른 환자 줄로 이동 → 환자 재지정
      t.room = wrap.dataset.room || "";
      t.name = wrap.dataset.name || "";
      save();
    }
    const ids = [...wrap.querySelectorAll(".task")].map(c => c.dataset.id);
    orders[targetKey] = ids;
    saveOrders(); render();
  }

  /* ── 팝오버 (내용/완료/수정/삭제) ── */
  function openPop(t, anchor){
    pop.dataset.id = t.id;
    pop.innerHTML = `
      <div class="pop-content">${t.content ? esc(t.content) : "<i>내용 없음</i>"}</div>
      <div class="pop-actions">
        <button data-a="done">${t.done ? "↩ 되돌리기" : "✓ 완료"}</button>
        <button data-a="edit">✎ 수정</button>
        <button data-a="del">🗑 삭제</button>
      </div>`;
    pop.classList.add("open");
    const r = anchor.getBoundingClientRect();
    const pw = 220, ph = pop.offsetHeight;
    let left = Math.min(r.left, window.innerWidth - pw - 8);
    let top = r.bottom + 6; if (top + ph > window.innerHeight - 8) top = r.top - ph - 6;
    pop.style.left = Math.max(8, left) + "px";
    pop.style.top = Math.max(8, top) + "px";
    pop.querySelectorAll("[data-a]").forEach(b =>
      b.addEventListener("click", e => { e.stopPropagation(); act(b.dataset.a, t.id); closePop(); }));
  }
  function closePop(){ pop.classList.remove("open"); }
  document.addEventListener("click", e => { if (!pop.contains(e.target) && !e.target.classList.contains("task")) closePop(); });

  function act(a, id){
    const t = tasks.find(x => x.id === id); if (!t) return;
    if (a === "del"){ tasks = tasks.filter(x => x.id !== id); save(); render(); }
    else if (a === "done"){ t.done = !t.done; save(); render(); }
    else if (a === "edit"){ openForm(t); }
  }

  /* ── 폼 ── */
  function setChips(){
    document.querySelectorAll('.chip[data-group="bg"]').forEach(c => c.classList.toggle("sel", c.dataset.val === sel.bg));
    document.querySelectorAll('.chip[data-group="bd"]').forEach(c => c.classList.toggle("sel", c.dataset.val === sel.bd));
  }
  document.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => { sel[c.dataset.group] = c.dataset.val; setChips(); }));

  function openForm(t, preset){
    closePop();
    editingId = t ? t.id : null;
    $("#f-title").value = t ? t.title : "";
    $("#f-room").value = t ? (t.room||"") : (preset ? preset.room : "");
    $("#f-name").value = t ? (t.name||"") : (preset ? preset.name : "");
    $("#f-content").value = t ? (t.content||"") : "";
    sel.bg = t ? t.bg : "regular";
    sel.bd = t ? t.bd : "none";
    $("#saveBtn").textContent = t ? "수정" : "추가";
    setChips();
    panel.classList.add("open");
    $("#f-title").focus();
  }
  function closeForm(){ panel.classList.remove("open"); editingId = null; form.reset(); }

  $("#addBtn").addEventListener("click", () => panel.classList.contains("open") ? closeForm() : openForm(null));
  $("#cancelBtn").addEventListener("click", closeForm);

  form.addEventListener("submit", e => {
    e.preventDefault();
    const data = { title:$("#f-title").value.trim(), room:$("#f-room").value.trim(), name:$("#f-name").value.trim(), content:$("#f-content").value.trim(), bg:sel.bg, bd:sel.bd };
    if (!data.title) return;
    if (editingId){ Object.assign(tasks.find(x => x.id === editingId), data); }
    else { tasks.push({ id:uid(), createdAt:Date.now(), done:false, ...data }); }
    save(); render(); closeForm();
  });

  /* ── 시계 ── */
  function tick(){ const n = new Date(); $("#clock").textContent = String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0"); }
  tick(); setInterval(tick, 15000);
  render();

  /* ── PWA ── */
  let deferred = null; const installBtn = $("#installBtn");
  window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferred = e; installBtn.style.display = "inline-block"; });
  installBtn.addEventListener("click", async () => { if (!deferred) return; deferred.prompt(); await deferred.userChoice; deferred = null; installBtn.style.display = "none"; });
  window.addEventListener("appinstalled", () => installBtn.style.display = "none");
  if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").then(r => swReg = r).catch(() => {}));
})();
</script>
